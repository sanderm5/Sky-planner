<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin Login | Sky Planner</title>
  <link rel="icon" type="image/svg+xml" href="/skyplanner-logo.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0e16;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo img { width: 36px; height: 36px; }
    .logo span { font-size: 18px; font-weight: 600; color: #e2e8f0; }
    .logo .badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="/skyplanner-logo.svg" alt="">
      <span>Sky Planner</span>
      <span class="badge">Admin</span>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
      <label for="email">E-post</label>
      <input type="email" id="email" placeholder="admin@efffekt.no" required autocomplete="email">
      <label for="password">Passord</label>
      <input type="password" id="password" placeholder="Passord" required autocomplete="current-password">
      <button type="submit" id="loginBtn">Logg inn</button>
    </form>
    <div class="footer">Kun for super-admin</div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var errorEl = document.getElementById('errorMsg');
      var btn = document.getElementById('loginBtn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logger inn...';

      try {
        // First, load the page to get the CSRF cookie set
        await fetch('/', { credentials: 'include' }).catch(function(){});

        // Get CSRF token from cookie
        var csrfToken = '';
        var match = document.cookie.match(/csrf_token=([^;]+)/);
        if (match) csrfToken = match[1];

        var headers = { 'Content-Type': 'application/json' };
        if (csrfToken) headers['X-CSRF-Token'] = csrfToken;

        var res = await fetch('/api/klient/login', {
          method: 'POST',
          headers: headers,
          credentials: 'include',
          body: JSON.stringify({ epost: email, passord: password })
        });

        if (!res.ok) {
          errorEl.textContent = 'Feil e-post eller passord';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Logg inn';
          return;
        }

        // Verify super-admin status
        var verifyRes = await fetch('/api/klient/verify', { credentials: 'include' });
        var verifyData = await verifyRes.json();

        if (verifyData.data && verifyData.data.user && verifyData.data.user.isSuperAdmin) {
          window.location.href = '/admin';
        } else {
          // Not super-admin — log out and show error
          fetch('/api/klient/logout', { method: 'POST', headers: headers, credentials: 'include' }).catch(function(){});
          errorEl.textContent = 'Kun super-admin har tilgang';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Logg inn';
        }
      } catch (err) {
        errorEl.textContent = 'Kunne ikke koble til server';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Logg inn';
      }
    });
  </script>
</body>
</html>
